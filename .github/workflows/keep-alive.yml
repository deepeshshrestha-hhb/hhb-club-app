name: Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"  # Every 10 minutes, every day
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          curl --fail --silent --show-error --max-time 30 \
            https://hhb-club.onrender.com/health
