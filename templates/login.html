{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card hhb-card">
            <div class="card-body">
                <h1 class="h4 mb-3 text-center">Admin Login</h1>
                <p class="text-muted text-center mb-4">Restricted area &mdash; club admins only.</p>

                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control"
                               autocomplete="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control"
                               autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-hhb-primary w-100">Login</button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
